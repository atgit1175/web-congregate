<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Bubbles</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0d0810;
  --surface: rgba(255,120,180,0.06);
  --border: rgba(255,140,190,0.15);
  --text: #f5e6f0;
  --muted: rgba(245,230,240,0.5);
  --accent: #ff6eb4;
  --accent2: #ff9ed3;
  --accent3: #d63090;
}

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-tap-highlight-color: transparent;
}

/* Pink nebula background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 80%, rgba(255,80,160,0.12) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 85% 10%, rgba(255,110,180,0.1) 0%, transparent 60%),
    radial-gradient(ellipse 50% 50% at 50% 50%, rgba(180,0,100,0.05) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

/* ── HEADER ── */
header {
  position: sticky;
  top: 0;
  z-index: 100;
  padding: 1rem 1.25rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 0.75rem;
  background: rgba(13,8,16,0.85);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}

.logo {
  font-family: 'Space Mono', monospace;
  font-size: 1rem;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}

.logo-dot {
  width: 9px; height: 9px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 10px var(--accent);
  animation: pdot 2.5s ease-in-out infinite;
}
@keyframes pdot {
  0%,100% { transform: scale(1); opacity:1; }
  50%      { transform: scale(0.75); opacity:0.6; }
}

.header-right {
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.sync-pill {
  font-family: 'Space Mono', monospace;
  font-size: 0.6rem;
  letter-spacing: 0.06em;
  color: var(--muted);
  padding: 0.3rem 0.65rem;
  border: 1px solid var(--border);
  border-radius: 999px;
  display: flex;
  align-items: center;
  gap: 5px;
  background: rgba(255,110,180,0.04);
  transition: all 0.3s;
  white-space: nowrap;
}
.sync-pill.ok   { color: #7fe07a; border-color: rgba(127,224,122,0.3); }
.sync-pill.busy { color: var(--accent2); border-color: rgba(255,158,211,0.35); }
.sync-pill.err  { color: #ff8c8c; border-color: rgba(255,140,140,0.3); }

.sync-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: currentColor;
  flex-shrink: 0;
}
.sync-pill.busy .sync-dot { animation: pdot 0.7s ease-in-out infinite; }

.add-btn {
  background: linear-gradient(135deg, rgba(255,110,180,0.22), rgba(214,48,144,0.14));
  border: 1px solid rgba(255,110,180,0.4);
  color: var(--accent2);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.85rem;
  font-weight: 500;
  padding: 0.5rem 1rem;
  border-radius: 999px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: all 0.2s;
  -webkit-appearance: none;
  flex-shrink: 0;
}
.add-btn:hover, .add-btn:active {
  background: linear-gradient(135deg, rgba(255,110,180,0.38), rgba(214,48,144,0.26));
  color: #fff;
  box-shadow: 0 0 16px rgba(255,110,180,0.25);
}
.add-btn svg { width: 14px; height: 14px; flex-shrink: 0; }

/* ── INPUT PANEL ── */
#inputPanel {
  position: relative;
  z-index: 90;
  display: none;
  padding: 1rem 1.25rem 0;
  max-width: 640px;
  margin: 0 auto;
}
#inputPanel.open { display: block; }

.input-card {
  background: rgba(255,110,180,0.05);
  border: 1px solid rgba(255,110,180,0.22);
  border-radius: 18px;
  padding: 1.25rem;
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  box-shadow: 0 4px 32px rgba(255,110,180,0.08);
  animation: slideDown 0.22s cubic-bezier(0.16,1,0.3,1);
}
@keyframes slideDown {
  from { opacity:0; transform: translateY(-10px); }
  to   { opacity:1; transform: translateY(0); }
}

.input-lbl {
  font-family: 'Space Mono', monospace;
  font-size: 0.65rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--accent);
  opacity: 0.85;
  margin-bottom: 0.65rem;
}

.field {
  width: 100%;
  display: block;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,110,180,0.18);
  border-radius: 10px;
  color: var(--text);
  font-size: 0.9rem;
  padding: 0.65rem 0.9rem;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  -webkit-appearance: none;
  appearance: none;
  margin-bottom: 0.65rem;
}
.field:focus {
  border-color: rgba(255,110,180,0.55);
  box-shadow: 0 0 0 3px rgba(255,110,180,0.08);
}
.field::placeholder { color: rgba(245,230,240,0.22); }
.field:last-child { margin-bottom: 0; }

#urlInput { font-family: 'Space Mono', monospace; font-size: 0.82rem; }

.input-row { display: flex; gap: 0.65rem; align-items: stretch; }
.input-row .field { flex: 1; margin-bottom: 0; }

.go-btn {
  background: linear-gradient(135deg, var(--accent), var(--accent3));
  border: none;
  border-radius: 10px;
  color: #fff;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.875rem;
  font-weight: 500;
  padding: 0 1.2rem;
  cursor: pointer;
  white-space: nowrap;
  box-shadow: 0 3px 14px rgba(255,110,180,0.3);
  transition: all 0.2s;
  -webkit-appearance: none;
  flex-shrink: 0;
  min-height: 44px;
}
.go-btn:hover, .go-btn:active { box-shadow: 0 5px 20px rgba(255,110,180,0.45); transform: translateY(-1px); }

/* ── EMPTY STATE ── */
#emptyState {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 5rem 2rem;
  text-align: center;
  position: relative;
  z-index: 5;
}
#emptyState.show { display: flex; }

.empty-ring {
  width: 96px; height: 96px;
  border-radius: 50%;
  border: 1px solid rgba(255,110,180,0.25);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 1.5rem;
  box-shadow: 0 0 32px rgba(255,110,180,0.07), inset 0 0 24px rgba(255,110,180,0.04);
  animation: floatRing 4s ease-in-out infinite;
}
@keyframes floatRing {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-8px); }
}
.empty-ring svg { width: 34px; height: 34px; color: rgba(255,110,180,0.45); }
#emptyState h2 { font-size: 1.25rem; font-weight: 400; margin-bottom: 0.4rem; }
#emptyState p  { font-size: 0.875rem; color: var(--muted); }

/* ── GRID ── */
#dashboard {
  position: relative;
  z-index: 5;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 1.25rem;
  padding: 1.5rem 1.25rem 5rem;
}

/* ── BUBBLE ── */
.bubble {
  position: relative;
  border-radius: 20px;
  overflow: hidden;
  cursor: pointer;
  aspect-ratio: 4/3;
  border: 1px solid rgba(255,110,180,0.12);
  background: rgba(255,110,180,0.03);
  transition:
    transform 0.32s cubic-bezier(0.34,1.56,0.64,1),
    box-shadow 0.32s ease,
    aspect-ratio 0.4s ease;
}

/* size tiers driven by link count */
.bubble[data-size="1"] { aspect-ratio: 4/3; }
.bubble[data-size="2"] { aspect-ratio: 3/2; }
.bubble[data-size="3"] { aspect-ratio: 5/3; }
.bubble[data-size="4"] { aspect-ratio: 16/9; }

.bubble::before {
  content:'';
  position: absolute; inset:0;
  border-radius: inherit;
  background: linear-gradient(140deg, rgba(255,180,210,0.07) 0%, transparent 55%);
  z-index: 3; pointer-events: none;
}
.bubble::after {
  content:'';
  position: absolute; inset:0;
  border-radius: inherit;
  background: radial-gradient(ellipse at 50% 0%, rgba(255,110,180,0.2) 0%, transparent 65%);
  opacity: 0;
  transition: opacity 0.3s;
  z-index: 2; pointer-events: none;
}
.bubble:hover { transform: scale(1.04) translateY(-3px); box-shadow: 0 16px 50px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,110,180,0.22), 0 0 40px rgba(255,110,180,0.1); }
.bubble:hover::after { opacity: 1; }
.bubble:active { transform: scale(1.01); }

/* iframe preview */
.bubble-frame {
  position: absolute; inset: 0;
  border-radius: inherit; overflow: hidden;
  z-index: 1;
}
.bubble-frame iframe {
  width: 200%; height: 200%;
  transform: scale(0.5);
  transform-origin: top left;
  border: none;
  pointer-events: none;
  filter: brightness(0.85) saturate(0.8);
}

/* fallback icon */
.bubble-icon {
  position: absolute; inset:0;
  display: flex; align-items: center; justify-content: center;
  background: radial-gradient(ellipse at 50% 40%, rgba(255,110,180,0.07) 0%, transparent 70%);
  z-index: 1;
}
.bubble-fav {
  width: 44px; height: 44px;
  border-radius: 10px;
  background: rgba(255,110,180,0.08);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Space Mono', monospace;
  font-size: 0.9rem;
  color: rgba(255,200,230,0.55);
}

/* overlay gradient + info */
.bubble-overlay {
  position: absolute; inset: 0; z-index: 4;
  display: flex; flex-direction: column; justify-content: flex-end;
  border-radius: inherit;
  background: linear-gradient(to top, rgba(13,8,16,0.9) 0%, rgba(13,8,16,0.15) 45%, transparent 70%);
}
.bubble-info {
  padding: 0.85rem 0.95rem 0.8rem;
  display: flex; align-items: flex-end; justify-content: space-between; gap: 0.4rem;
}
.bubble-name {
  font-size: 0.825rem; font-weight: 500; color: #fff;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1;
}
.bubble-domain {
  font-size: 0.65rem; color: rgba(255,200,230,0.4);
  font-family: 'Space Mono', monospace;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  margin-top: 2px;
}
.bubble-hint {
  font-size: 0.65rem; color: rgba(255,110,180,0.75);
  display: flex; align-items: center; gap: 3px;
  opacity: 0; transition: opacity 0.2s; flex-shrink: 0;
}
.bubble:hover .bubble-hint { opacity: 1; }
.bubble-hint svg { width: 10px; height: 10px; }

/* link count badge */
.bubble-count {
  position: absolute; top: 9px; left: 9px; z-index: 6;
  font-family: 'Space Mono', monospace; font-size: 0.58rem;
  padding: 2px 6px; border-radius: 999px;
  background: rgba(255,110,180,0.18);
  border: 1px solid rgba(255,110,180,0.32);
  color: var(--accent2);
  opacity: 0; transition: opacity 0.2s;
}
.bubble:hover .bubble-count { opacity: 1; }

/* delete */
.del-btn {
  position: absolute; top: 9px; right: 9px; z-index: 6;
  width: 26px; height: 26px; border-radius: 50%;
  background: rgba(13,8,16,0.72);
  border: 1px solid rgba(255,110,180,0.15);
  color: rgba(245,230,240,0.42);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity 0.2s, background 0.2s, color 0.2s;
  backdrop-filter: blur(6px);
}
.bubble:hover .del-btn,
.bubble:focus-within .del-btn { opacity: 1; }
.del-btn:hover { color: #ff6b6b; background: rgba(255,107,107,0.18); }
.del-btn svg { width: 11px; height: 11px; }

/* ── FULLSCREEN ── */
#fsOverlay {
  position: fixed; inset:0; z-index: 1000;
  background: var(--bg);
  display: flex; flex-direction: column;
  opacity: 0; pointer-events: none;
  transition: opacity 0.28s ease;
}
#fsOverlay.open { opacity:1; pointer-events: all; }

.fs-bar {
  height: 50px; flex-shrink: 0;
  background: rgba(13,8,16,0.9);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 1rem; gap: 0.75rem;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}
.fs-close {
  width: 30px; height: 30px; border-radius: 50%;
  background: rgba(255,110,180,0.07);
  border: 1px solid var(--border);
  color: var(--text); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s; flex-shrink: 0;
}
.fs-close:hover { background: rgba(255,107,107,0.18); color: #ff6b6b; }
.fs-close svg { width: 12px; height: 12px; }
.fs-title { font-size: 0.85rem; font-weight: 500; color: var(--text); flex:1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.fs-ext {
  display: flex; align-items: center; gap: 5px;
  font-size: 0.78rem; color: var(--accent);
  background: rgba(255,110,180,0.1);
  border: 1px solid rgba(255,110,180,0.28);
  border-radius: 8px; padding: 0.3rem 0.75rem;
  text-decoration: none; transition: all 0.2s; flex-shrink: 0;
}
.fs-ext:hover { background: rgba(255,110,180,0.2); }
.fs-ext svg { width: 12px; height: 12px; }
.fs-body { flex:1; position: relative; overflow: hidden; }
.fs-iframe { width:100%; height:100%; border:none; display:block; }
.fs-blocked {
  position: absolute; inset:0;
  display: none; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 0.85rem; color: var(--muted);
  text-align: center; padding: 2rem;
}
.fs-blocked.show { display: flex; }
.fs-blocked svg { width:44px; height:44px; opacity:0.28; }
.fs-blocked h3 { font-size: 1rem; font-weight: 400; color: var(--text); }
.fs-blocked p { font-size: 0.82rem; max-width: 320px; line-height: 1.6; }
.fs-blocked a { color: var(--accent); text-decoration: none; border-bottom: 1px solid rgba(255,110,180,0.3); }

/* ── RIPPLE ── */
@keyframes ripple { from{transform:scale(0);opacity:0.4} to{transform:scale(5);opacity:0} }
.rip {
  position: absolute; border-radius: 50%;
  background: rgba(255,110,180,0.3);
  width: 50px; height: 50px; margin: -25px;
  animation: ripple 0.55s ease-out forwards;
  pointer-events: none; z-index: 10;
}

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 1.5rem; left: 50%;
  transform: translateX(-50%) translateY(16px);
  background: rgba(20,12,24,0.95);
  border: 1px solid var(--border);
  border-radius: 10px; padding: 0.6rem 1rem;
  font-size: 0.75rem; font-family: 'Space Mono', monospace;
  color: var(--muted); z-index: 2000;
  opacity: 0; transition: opacity 0.22s, transform 0.22s;
  pointer-events: none; white-space: nowrap;
  backdrop-filter: blur(16px);
}
.toast.show { opacity:1; transform: translateX(-50%) translateY(0); }

/* scrollbar */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-thumb { background: rgba(255,110,180,0.18); border-radius: 99px; }

@media (max-width: 480px) {
  #dashboard { grid-template-columns: 1fr 1fr; gap: 0.85rem; padding: 1rem 0.85rem 4rem; }
  .bubble { border-radius: 16px; }
  .bubble-info { padding: 0.65rem 0.75rem; }
  .bubble-name { font-size: 0.75rem; }
}
</style>
</head>
<body>

<header>
  <div class="logo"><div class="logo-dot"></div>bubbles</div>
  <div class="header-right">
    <div class="sync-pill" id="syncPill">
      <div class="sync-dot"></div>
      <span id="syncTxt">local</span>
    </div>
    <button class="add-btn" id="addBtn">
      <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="7" y1="1" x2="7" y2="13"/><line x1="1" y1="7" x2="13" y2="7"/>
      </svg>
      Add link
    </button>
  </div>
</header>

<div id="inputPanel">
  <div class="input-card">
    <div class="input-lbl">new bubble</div>
    <input id="urlInput" class="field" type="url" placeholder="https://example.com" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
    <div class="input-row">
      <input id="titleInput" class="field" type="text" placeholder="Label (optional)" autocomplete="off" />
      <button class="go-btn" id="goBtn">Add</button>
    </div>
  </div>
</div>

<div id="emptyState">
  <div class="empty-ring">
    <svg viewBox="0 0 36 36" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round">
      <circle cx="18" cy="18" r="14" opacity="0.45"/>
      <circle cx="18" cy="18" r="7" opacity="0.6"/>
      <line x1="18" y1="4" x2="18" y2="32" opacity="0.3"/>
      <line x1="4" y1="18" x2="32" y2="18" opacity="0.3"/>
    </svg>
  </div>
  <h2>No bubbles yet</h2>
  <p>Tap <strong>Add link</strong> to create your first window</p>
</div>

<div id="dashboard"></div>

<div id="fsOverlay">
  <div class="fs-bar">
    <button class="fs-close" id="fsClose">
      <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="1" y1="1" x2="11" y2="11"/><line x1="11" y1="1" x2="1" y2="11"/>
      </svg>
    </button>
    <div class="fs-title" id="fsTitle"></div>
    <a class="fs-ext" id="fsExt" target="_blank" rel="noopener">
      <svg viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 2H2v9h9V8"/><path d="M8 2h3v3"/><line x1="4.5" y1="8.5" x2="11" y2="2"/>
      </svg>
      Open
    </a>
  </div>
  <div class="fs-body">
    <div class="fs-blocked" id="fsBlocked">
      <svg viewBox="0 0 44 44" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round">
        <circle cx="22" cy="22" r="18"/><line x1="22" y1="13" x2="22" y2="24"/><circle cx="22" cy="30" r="1.4" fill="currentColor"/>
      </svg>
      <h3>Can't embed this site</h3>
      <p>This site blocks iframe embedding. Open it in a new tab instead.</p>
      <a id="fsBlockedLink" href="#" target="_blank" rel="noopener">Open site ↗</a>
    </div>
    <iframe class="fs-iframe" id="fsFrame" src="about:blank" allow="*"></iframe>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function() {
'use strict';

// ── 1. Connect to your Supabase Database ──────────────────────────────────
var SUBAPASE_URL = 'https://iixjbhwuaofudrgcyjtb.supabase.co/rest/v1/bubbles';
var SUPABASE_KEY = 'sb_publishable_-njmL60ZH916dDsDIehLfQ_rbJ9KrTm';
var supabase = window.supabase.createClient(SUBAPASE_URL, SUPABASE_KEY);

var SKEY = 'bubbles-v2';
var bubbles = [];
var panelOpen = false;

// ── Sync UI Status Indicator ──────────────────────────────────────────────
function setSyncUI(state, label) {
  var p = document.getElementById('syncPill');
  if (p) {
    p.className = 'sync-pill' + (state ? ' ' + state : '');
    document.getElementById('syncTxt').textContent = label;
  }
}

function toast(msg, ms) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(function(){ t.classList.remove('show'); }, ms || 2000);
}

function localSave() {
  try { localStorage.setItem(SKEY, JSON.stringify(bubbles)); } catch(e) {}
}

function localLoad() {
  try {
    var raw = localStorage.getItem(SKEY) || '[]';
    return JSON.parse(raw);
  } catch(e) { return []; }
}

function mergeArrays(remote, local) {
  var map = {};
  local.forEach(function(b){ map[b.id] = b; });
  remote.forEach(function(b){ map[b.id] = b; });
  var arr = Object.values(map);
  arr.sort(function(a,b){ return (a.addedAt||0)-(b.addedAt||0); });
  return arr;
}

// ── 2. New Database Cloud Sync Functions ──────────────────────────────────
async function doSyncLoad(cb) {
  setSyncUI('busy', 'syncing…');
  
  try {
    // Look up the row in the database named 'global-dashboard'
    var response = await supabase.from('bubbles').select('data').eq('sync_id', 'global-dashboard');
    
    if (response.error) throw response.error;

    var remote = [];
    if (response.data && response.data.length > 0) {
      remote = response.data[0].data;
    }
    
    var local = localLoad();
    bubbles = mergeArrays(remote, local);
    localSave();
    setSyncUI('ok', 'synced ✓');
  } catch(e) {
    console.error(e);
    bubbles = localLoad();
    setSyncUI('err', 'local only');
  }
  cb();
}

async function doSyncSave() {
  localSave();
  setSyncUI('busy', 'saving…');
  
  try {
    // Send your updated dashboard list up to the cloud row
    var response = await supabase.from('bubbles').upsert({ 
      sync_id: 'global-dashboard', 
      data: bubbles 
    });
    
    if (response.error) throw response.error;
    setSyncUI('ok', 'saved cloud ✓');
  } catch(e) {
    console.error(e);
    setSyncUI('err', 'save failed');
  }
}

// Automatic polling - checks the cloud every 5 seconds for updates made by your other device
async function pollRemote() {
  try {
    var response = await supabase.from('bubbles').select('data').eq('sync_id', 'global-dashboard');
    if (response.error || !response.data || response.data.length === 0) return;
    
    var remote = response.data[0].data;
    if (JSON.stringify(remote) === JSON.stringify(bubbles)) return; // No changes
    
    bubbles = remote;
    localSave();
    
    // Refresh the view completely
    document.getElementById('dashboard').innerHTML = '';
    bubbles.forEach(renderBubble);
    recalc(); 
    updateEmpty();
    toast('↕ synced from cloud');
  } catch(e) {}
}

// ── Domain helpers ─────────────────────────────────────────────────────────
function getDomain(url) {
  try { return new URL(url).hostname.replace(/^www\./, ''); } catch(e) { return url; }
}

function getFavicon(url) {
  try { return 'https://www.google.com/s2/favicons?domain=' + encodeURIComponent(new URL(url).origin) + '&sz=64'; }
  catch(e) { return ''; }
}

function initials(str) { return (str || '??').slice(0,2).toUpperCase(); }

function sizeFromCount(n) {
  if (n >= 4) return '4';
  if (n === 3) return '3';
  if (n === 2) return '2';
  return '1';
}

function recalc() {
  var dcounts = {};
  bubbles.forEach(function(b){ var d = getDomain(b.url); dcounts[d] = (dcounts[d]||0)+1; });
  bubbles.forEach(function(b){
    var cnt = dcounts[getDomain(b.url)];
    var el = document.querySelector('[data-id="'+b.id+'"]');
    if (el) {
      el.setAttribute('data-size', sizeFromCount(cnt));
      var badge = el.querySelector('.bubble-count');
      if (badge) badge.textContent = cnt > 1 ? ('×'+cnt) : '';
    }
  });
  var grid = document.getElementById('dashboard');
  var n = bubbles.length;
  if (n <= 2) grid.style.gridTemplateColumns = 'repeat(auto-fill, minmax(320px, 1fr))';
  else if (n <= 6) grid.style.gridTemplateColumns = 'repeat(auto-fill, minmax(280px, 1fr))';
  else if (n <= 12) grid.style.gridTemplateColumns = 'repeat(auto-fill, minmax(240px, 1fr))';
  else grid.style.gridTemplateColumns = 'repeat(auto-fill, minmax(200px, 1fr))';
}

function updateEmpty() {
  var e = document.getElementById('emptyState');
  e.className = bubbles.length === 0 ? 'show' : '';
}

function renderBubble(b) {
  var el = document.createElement('div');
  el.className = 'bubble';
  el.setAttribute('data-id', b.id);
  el.setAttribute('data-size', '1');

  var fav = getFavicon(b.url);
  var ini = initials(b.title);

  el.innerHTML = [
    '<div class="bubble-frame">',
      '<iframe src="', b.url, '" loading="lazy"',
        ' sandbox="allow-scripts allow-same-origin allow-forms"',
        ' title="', b.title.replace(/"/g,''), '"',
        ' onload="this.closest(\'.bubble\').querySelector(\'.bubble-icon\').style.display=\'none\'"',
      '></iframe>',
    '</div>',
    '<div class="bubble-icon">',
      '<div class="bubble-fav" id="fav-', b.id, '">',
        '<img src="', fav, '" width="28" height="28" style="border-radius:6px"',
          ' onerror="this.parentElement.textContent=\'', ini, '\'"',
        '/>',
      '</div>',
    '</div>',
    '<div class="bubble-overlay">',
      '<div class="bubble-info">',
        '<div style="min-width:0;flex:1">',
          '<div class="bubble-name">', escHtml(b.title), '</div>',
          '<div class="bubble-domain">', escHtml(getDomain(b.url)), '</div>',
        '</div>',
        '<div class="bubble-hint">',
          '<svg viewBox="0 0 11 11" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 2H2v7h7V7"/><path d="M6 2h3v3"/><line x1="4.5" y1="6.5" x2="9" y2="2"/></svg>',
          'open',
        '</div>',
      '</div>',
    '</div>',
    '<div class="bubble-count"></div>',
    '<button class="del-btn" data-del="', b.id, '" title="Remove">',
      '<svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">',
        '<line x1="2" y1="2" x2="10" y2="10"/><line x1="10" y1="2" x2="2" y2="10"/>',
      '</svg>',
    '</button>'
  ].join('');

  document.getElementById('dashboard').appendChild(el);
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function removeBubbleEl(id) {
  var el = document.querySelector('[data-id="'+id+'"]');
  if (!el) return;
  el.style.transition = 'opacity 0.2s, transform 0.2s';
  el.style.opacity = '0';
  el.style.transform = 'scale(0.85)';
  setTimeout(function(){ if (el.parentNode) el.parentNode.removeChild(el); }, 220);
}

function ripple(el, e) {
  var r = el.getBoundingClientRect();
  var d = document.createElement('div');
  d.className = 'rip';
  d.style.left = (e.clientX - r.left) + 'px';
  d.style.top  = (e.clientY - r.top)  + 'px';
  el.appendChild(d);
  setTimeout(function(){ if (d.parentNode) d.parentNode.removeChild(d); }, 600);
}

function openFS(b) {
  var ov = document.getElementById('fsOverlay');
  document.getElementById('fsTitle').textContent = b.title;
  document.getElementById('fsExt').href = b.url;
  document.getElementById('fsBlockedLink').href = b.url;
  document.getElementById('fsBlockedLink').textContent = 'Open ' + getDomain(b.url) + ' ↗';

  var frame = document.getElementById('fsFrame');
  var blocked = document.getElementById('fsBlocked');
  blocked.className = 'fs-blocked';
  frame.style.display = 'block';
  frame.src = b.url;

  frame.onerror = function() {
    blocked.className = 'fs-blocked show';
    frame.style.display = 'none';
  };

  ov.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeFS() {
  var ov = document.getElementById('fsOverlay');
  ov.classList.remove('open');
  document.body.style.overflow = '';
  setTimeout(function(){
    document.getElementById('fsFrame').src = 'about:blank';
  }, 320);
}

function togglePanel() {
  panelOpen = !panelOpen;
  var p = document.getElementById('inputPanel');
  p.className = panelOpen ? 'open' : '';
  if (panelOpen) {
    setTimeout(function(){ document.getElementById('urlInput').focus(); }, 60);
  }
}

function doAdd() {
  var urlEl = document.getElementById('urlInput');
  var titleEl = document.getElementById('titleInput');
  var url = urlEl.value.trim();
  var title = titleEl.value.trim();
  if (!url) { urlEl.focus(); return; }
  if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
  var b = { id: Date.now().toString(36) + Math.random().toString(36).slice(2), url: url, title: title || getDomain(url), addedAt: Date.now() };
  bubbles.push(b);
  doSyncSave();
  renderBubble(b);
  recalc();
  updateEmpty();
  urlEl.value = '';
  titleEl.value = '';
  togglePanel();
}

function doDelete(id) {
  bubbles = bubbles.filter(function(b){ return b.id !== id; });
  doSyncSave();
  removeBubbleEl(id);
  setTimeout(function(){ recalc(); updateEmpty(); }, 250);
}

document.getElementById('addBtn').addEventListener('click', function(){ togglePanel(); });
document.getElementById('goBtn').addEventListener('click', function(){ doAdd(); });
document.getElementById('fsClose').addEventListener('click', function(){ closeFS(); });

document.getElementById('urlInput').addEventListener('keydown', function(e){
  if (e.key === 'Enter') document.getElementById('titleInput').focus();
});
document.getElementById('titleInput').addEventListener('keydown', function(e){
  if (e.key === 'Enter') doAdd();
});

document.addEventListener('keydown', function(e){
  if (e.key !== 'Escape') return;
  if (document.getElementById('fsOverlay').classList.contains('open')) closeFS();
  else if (panelOpen) togglePanel();
});

document.getElementById('dashboard').addEventListener('click', function(e) {
  var delBtn = e.target.closest('[data-del]');
  if (delBtn) {
    e.stopPropagation();
    doDelete(delBtn.getAttribute('data-del'));
    return;
  }
  var bub = e.target.closest('.bubble');
  if (!bub) return;
  var id = bub.getAttribute('data-id');
  var b = bubbles.find(function(x){ return x.id === id; });
  if (!b) return;
  ripple(bub, e);
  setTimeout(function(){ openFS(b); }, 160);
});

// ── Boot ───────────────────────────────────────────────────────────────────
doSyncLoad(function() {
  if (bubbles.length === 0) {
    bubbles = [
      { id:'demo1', url:'https://wikipedia.org', title:'Wikipedia', addedAt:1 },
      { id:'demo2', url:'https://news.ycombinator.com', title:'Hacker News', addedAt:2 },
      { id:'demo3', url:'https://openweathermap.org', title:'Weather', addedAt:3 },
      { id:'demo4', url:'https://github.com/trending', title:'GitHub Trending', addedAt:4 }
    ];
    doSyncSave();
  }
  bubbles.forEach(renderBubble);
  recalc();
  updateEmpty();
  
  // Poll the database every 5 seconds to look for cross-device changes
  setInterval(pollRemote, 5000);
});

})();
</script>
