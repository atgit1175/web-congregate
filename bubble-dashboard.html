<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bubble Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #080b14;
    --surface: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.09);
    --text: #e8eaf0;
    --muted: rgba(232,234,240,0.45);
    --accent: #6c8fff;
    --accent2: #a78bfa;
    --glow: rgba(108,143,255,0.18);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Starfield bg */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.25) 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 70%, rgba(255,255,255,0.2) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 80% 20%, rgba(255,255,255,0.15) 0%, transparent 100%),
      radial-gradient(1px 1px at 40% 80%, rgba(255,255,255,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 10% 60%, rgba(255,255,255,0.15) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 50%, rgba(255,255,255,0.1) 0%, transparent 100%),
      radial-gradient(ellipse 60% 40% at 50% 100%, rgba(108,143,255,0.06) 0%, transparent 70%),
      radial-gradient(ellipse 40% 30% at 80% 0%, rgba(167,139,250,0.05) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* Header */
  header {
    position: relative;
    z-index: 10;
    padding: 2rem 2.5rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 0.5px solid var(--border);
  }

  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 1.1rem;
    letter-spacing: -0.02em;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 12px var(--accent);
    animation: pulse-dot 2.4s ease-in-out infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(0.8); }
  }

  .add-btn {
    background: var(--surface);
    border: 0.5px solid var(--border);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.875rem;
    padding: 0.55rem 1.25rem;
    border-radius: 999px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.2s;
    backdrop-filter: blur(8px);
  }

  .add-btn:hover {
    background: rgba(108,143,255,0.12);
    border-color: rgba(108,143,255,0.35);
    color: #fff;
  }

  .add-btn svg { width: 15px; height: 15px; }

  /* Input panel */
  .input-panel {
    position: relative;
    z-index: 10;
    max-width: 680px;
    margin: 0 auto;
    padding: 2rem 2.5rem 0;
    display: none;
  }

  .input-panel.open { display: block; }

  .input-wrap {
    background: rgba(255,255,255,0.03);
    border: 0.5px solid rgba(255,255,255,0.12);
    border-radius: 18px;
    padding: 1.5rem;
    backdrop-filter: blur(20px);
    animation: slide-in 0.25s cubic-bezier(0.16, 1, 0.3, 1);
  }

  @keyframes slide-in {
    from { opacity: 0; transform: translateY(-12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .input-label {
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 0.75rem;
    font-family: 'Space Mono', monospace;
  }

  .url-input {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 0.5px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 0.875rem;
    padding: 0.75rem 1rem;
    outline: none;
    transition: border-color 0.2s;
    display: block;
    margin-bottom: 0.75rem;
  }

  .url-input:focus { border-color: rgba(108,143,255,0.5); }
  .url-input::placeholder { color: rgba(232,234,240,0.2); }

  .input-row { display: flex; gap: 0.75rem; align-items: center; }

  .title-input {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border: 0.5px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.875rem;
    padding: 0.7rem 1rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .title-input:focus { border-color: rgba(108,143,255,0.5); }
  .title-input::placeholder { color: rgba(232,234,240,0.2); }

  .submit-btn {
    background: var(--accent);
    border: none;
    border-radius: 10px;
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.875rem;
    font-weight: 500;
    padding: 0.7rem 1.4rem;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .submit-btn:hover { background: #8aaeff; transform: translateY(-1px); }
  .submit-btn:active { transform: translateY(0); }

  /* Empty state */
  .empty-state {
    position: relative;
    z-index: 5;
    text-align: center;
    padding: 6rem 2rem;
    display: none;
  }

  .empty-state.visible { display: block; }

  .empty-orb {
    width: 120px; height: 120px;
    border-radius: 50%;
    border: 0.5px solid rgba(108,143,255,0.2);
    margin: 0 auto 2rem;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    animation: float 4s ease-in-out infinite;
  }

  .empty-orb::before {
    content: '';
    position: absolute;
    inset: 10px;
    border-radius: 50%;
    border: 0.5px solid rgba(108,143,255,0.15);
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  .empty-orb svg { width: 40px; height: 40px; color: rgba(108,143,255,0.5); }

  .empty-state h2 {
    font-size: 1.4rem;
    font-weight: 400;
    color: var(--text);
    margin-bottom: 0.5rem;
  }

  .empty-state p {
    color: var(--muted);
    font-size: 0.9rem;
  }

  /* Dashboard grid */
  .dashboard {
    position: relative;
    z-index: 5;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1.5rem;
    padding: 2rem 2.5rem 4rem;
  }

  /* Bubble */
  .bubble {
    position: relative;
    border-radius: 24px;
    overflow: hidden;
    cursor: pointer;
    aspect-ratio: 4/3;
    transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1),
                box-shadow 0.35s ease;
    transform-origin: center center;
    border: 0.5px solid rgba(255,255,255,0.07);
    background: rgba(255,255,255,0.03);
  }

  .bubble::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    background: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, transparent 60%);
    z-index: 3;
    pointer-events: none;
  }

  .bubble::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    opacity: 0;
    transition: opacity 0.35s;
    background: radial-gradient(ellipse at 50% 0%, rgba(108,143,255,0.18) 0%, transparent 70%);
    z-index: 2;
    pointer-events: none;
  }

  .bubble:hover {
    transform: scale(1.06) translateY(-4px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(108,143,255,0.2), 0 0 40px rgba(108,143,255,0.08);
  }

  .bubble:hover::after { opacity: 1; }

  .bubble:active { transform: scale(1.03); }

  /* Iframe inside bubble */
  .bubble-iframe-wrap {
    position: absolute;
    inset: 0;
    border-radius: inherit;
    overflow: hidden;
  }

  .bubble-iframe-wrap iframe {
    width: 200%;
    height: 200%;
    transform: scale(0.5);
    transform-origin: top left;
    border: none;
    pointer-events: none;
    border-radius: 0;
    filter: brightness(0.92) saturate(0.9);
  }

  /* Bubble overlay (gradient + info) */
  .bubble-overlay {
    position: absolute;
    inset: 0;
    z-index: 4;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    border-radius: inherit;
    background: linear-gradient(to top, rgba(8,11,20,0.85) 0%, rgba(8,11,20,0.2) 40%, transparent 70%);
    transition: background 0.3s;
  }

  .bubble:hover .bubble-overlay {
    background: linear-gradient(to top, rgba(8,11,20,0.75) 0%, rgba(8,11,20,0.1) 40%, transparent 70%);
  }

  .bubble-info {
    padding: 1rem 1.1rem 0.9rem;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 0.5rem;
  }

  .bubble-title {
    font-size: 0.875rem;
    font-weight: 500;
    color: #fff;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }

  .bubble-url {
    font-size: 0.7rem;
    color: rgba(255,255,255,0.4);
    font-family: 'Space Mono', monospace;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 2px;
  }

  .bubble-open-hint {
    font-size: 0.7rem;
    color: rgba(108,143,255,0.7);
    display: flex;
    align-items: center;
    gap: 4px;
    opacity: 0;
    transition: opacity 0.25s;
    flex-shrink: 0;
  }

  .bubble:hover .bubble-open-hint { opacity: 1; }
  .bubble-open-hint svg { width: 11px; height: 11px; }

  .delete-btn {
    position: absolute;
    top: 10px;
    right: 10px;
    z-index: 6;
    width: 26px; height: 26px;
    border-radius: 50%;
    background: rgba(8,11,20,0.7);
    border: 0.5px solid rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.4);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.2s, color 0.2s, background 0.2s;
    backdrop-filter: blur(8px);
  }

  .bubble:hover .delete-btn { opacity: 1; }
  .delete-btn:hover { color: #ff6b6b; background: rgba(255,107,107,0.15); }
  .delete-btn svg { width: 12px; height: 12px; }

  /* Placeholder when iframe blocked */
  .bubble-placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--surface);
    z-index: 1;
  }

  .bubble-favicon {
    width: 48px; height: 48px;
    border-radius: 12px;
    background: rgba(255,255,255,0.05);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.4rem;
    letter-spacing: 0;
  }

  /* FULLSCREEN MODAL */
  .fullscreen-overlay {
    position: fixed;
    inset: 0;
    z-index: 1000;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .fullscreen-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .fullscreen-bar {
    height: 52px;
    background: rgba(8,11,20,0.9);
    border-bottom: 0.5px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 1.25rem;
    gap: 1rem;
    backdrop-filter: blur(20px);
    flex-shrink: 0;
  }

  .close-btn {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: rgba(255,255,255,0.06);
    border: 0.5px solid var(--border);
    color: var(--text);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .close-btn:hover { background: rgba(255,107,107,0.15); color: #ff6b6b; }
  .close-btn svg { width: 14px; height: 14px; }

  .fullscreen-title {
    font-size: 0.875rem;
    font-weight: 500;
    color: var(--text);
    flex: 1;
  }

  .fullscreen-url {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 300px;
  }

  .external-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.8rem;
    color: var(--accent);
    background: rgba(108,143,255,0.1);
    border: 0.5px solid rgba(108,143,255,0.25);
    border-radius: 8px;
    padding: 0.35rem 0.85rem;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .external-btn:hover { background: rgba(108,143,255,0.2); }
  .external-btn svg { width: 13px; height: 13px; }

  .fullscreen-content {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  .fullscreen-iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  .blocked-msg {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    color: var(--muted);
    text-align: center;
    padding: 2rem;
  }

  .blocked-msg svg { width: 48px; height: 48px; opacity: 0.3; }
  .blocked-msg h3 { font-size: 1.1rem; font-weight: 400; color: var(--text); }
  .blocked-msg p { font-size: 0.875rem; max-width: 360px; line-height: 1.6; }
  .blocked-msg a {
    color: var(--accent);
    text-decoration: none;
    border-bottom: 0.5px solid rgba(108,143,255,0.3);
    transition: border-color 0.2s;
  }
  .blocked-msg a:hover { border-color: var(--accent); }

  /* Ripple click effect */
  @keyframes ripple {
    from { transform: scale(0); opacity: 0.4; }
    to { transform: scale(4); opacity: 0; }
  }

  .ripple-el {
    position: absolute;
    border-radius: 50%;
    background: rgba(108,143,255,0.3);
    width: 60px; height: 60px;
    margin: -30px;
    animation: ripple 0.6s ease-out forwards;
    pointer-events: none;
    z-index: 10;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 99px; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    bubbles
  </div>
  <button class="add-btn" onclick="toggleInput()">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
      <line x1="8" y1="2" x2="8" y2="14"/><line x1="2" y1="8" x2="14" y2="8"/>
    </svg>
    Add link
  </button>
</header>

<div class="input-panel" id="inputPanel">
  <div class="input-wrap">
    <div class="input-label">new bubble</div>
    <input class="url-input" id="urlInput" type="url" placeholder="https://example.com" autocomplete="off" />
    <div class="input-row">
      <input class="title-input" id="titleInput" type="text" placeholder="Label (optional)" autocomplete="off" />
      <button class="submit-btn" onclick="addBubble()">Add bubble</button>
    </div>
  </div>
</div>

<div class="empty-state" id="emptyState">
  <div class="empty-orb">
    <svg viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round">
      <circle cx="20" cy="20" r="16" opacity="0.4"/>
      <circle cx="20" cy="20" r="8" opacity="0.6"/>
      <line x1="20" y1="4" x2="20" y2="36" opacity="0.3"/>
      <line x1="4" y1="20" x2="36" y2="20" opacity="0.3"/>
    </svg>
  </div>
  <h2>No bubbles yet</h2>
  <p>Add a link above to create your first window</p>
</div>

<div class="dashboard" id="dashboard"></div>

<!-- Fullscreen modal -->
<div class="fullscreen-overlay" id="fullscreenOverlay">
  <div class="fullscreen-bar">
    <button class="close-btn" onclick="closeFullscreen()">
      <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <line x1="2" y1="2" x2="12" y2="12"/><line x1="12" y1="2" x2="2" y2="12"/>
      </svg>
    </button>
    <div class="fullscreen-title" id="fsTitle"></div>
    <div class="fullscreen-url" id="fsUrl"></div>
    <a class="external-btn" id="fsExternal" target="_blank" rel="noopener">
      <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 2H2v10h10V8"/><path d="M9 2h3v3"/><line x1="6" y1="8" x2="12" y2="2"/>
      </svg>
      Open
    </a>
  </div>
  <div class="fullscreen-content" id="fsContent"></div>
</div>

<script>
let bubbles = JSON.parse(localStorage.getItem('bubbles') || '[]');
let inputOpen = false;

function toggleInput() {
  inputOpen = !inputOpen;
  document.getElementById('inputPanel').classList.toggle('open', inputOpen);
  if (inputOpen) setTimeout(() => document.getElementById('urlInput').focus(), 50);
}

function getDomain(url) {
  try { return new URL(url).hostname.replace('www.', ''); }
  catch { return url; }
}

function getFaviconUrl(url) {
  try { const d = new URL(url).origin; return `https://www.google.com/s2/favicons?domain=${d}&sz=64`; }
  catch { return ''; }
}

function getInitials(title) {
  return title.slice(0, 2).toUpperCase();
}

function addBubble() {
  let url = document.getElementById('urlInput').value.trim();
  const title = document.getElementById('titleInput').value.trim();
  if (!url) return;
  if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
  const bubble = {
    id: Date.now().toString(),
    url,
    title: title || getDomain(url)
  };
  bubbles.push(bubble);
  save();
  renderBubble(bubble);
  document.getElementById('urlInput').value = '';
  document.getElementById('titleInput').value = '';
  updateEmpty();
  toggleInput();
}

function deleteBubble(id, e) {
  e.stopPropagation();
  bubbles = bubbles.filter(b => b.id !== id);
  save();
  const el = document.querySelector(`[data-id="${id}"]`);
  if (el) { el.style.transition = 'opacity 0.2s, transform 0.2s'; el.style.opacity = '0'; el.style.transform = 'scale(0.85)'; setTimeout(() => el.remove(), 200); }
  updateEmpty();
}

function save() { localStorage.setItem('bubbles', JSON.stringify(bubbles)); }

function updateEmpty() {
  document.getElementById('emptyState').classList.toggle('visible', bubbles.length === 0);
}

function renderBubble(b) {
  const el = document.createElement('div');
  el.className = 'bubble';
  el.setAttribute('data-id', b.id);

  const faviconUrl = getFaviconUrl(b.url);
  const initials = getInitials(b.title);

  el.innerHTML = `
    <div class="bubble-iframe-wrap">
      <iframe src="${b.url}" loading="lazy" sandbox="allow-scripts allow-same-origin allow-forms" title="${b.title}" onload="this.parentElement.nextElementSibling.style.display='none'" onerror=""></iframe>
    </div>
    <div class="bubble-placeholder">
      <div class="bubble-favicon">
        <img src="${faviconUrl}" width="32" height="32" style="border-radius:6px" onerror="this.parentElement.innerHTML='${initials}'; this.parentElement.style.fontFamily='Space Mono,monospace'; this.parentElement.style.fontSize='0.95rem'; this.parentElement.style.color='rgba(232,234,240,0.5)'" />
      </div>
    </div>
    <div class="bubble-overlay">
      <div class="bubble-info">
        <div style="overflow:hidden">
          <div class="bubble-title">${b.title}</div>
          <div class="bubble-url">${getDomain(b.url)}</div>
        </div>
        <div class="bubble-open-hint">
          <svg viewBox="0 0 11 11" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 2H2v7h7V7"/><path d="M6 2h3v3"/><line x1="4.5" y1="6.5" x2="9" y2="2"/>
          </svg>
          open
        </div>
      </div>
    </div>
    <button class="delete-btn" onclick="deleteBubble('${b.id}', event)" title="Remove">
      <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <line x1="2" y1="2" x2="10" y2="10"/><line x1="10" y1="2" x2="2" y2="10"/>
      </svg>
    </button>
  `;

  el.addEventListener('click', (e) => {
    if (e.target.closest('.delete-btn')) return;
    addRipple(el, e);
    setTimeout(() => openFullscreen(b), 180);
  });

  document.getElementById('dashboard').appendChild(el);
}

function addRipple(el, e) {
  const rect = el.getBoundingClientRect();
  const r = document.createElement('div');
  r.className = 'ripple-el';
  r.style.left = (e.clientX - rect.left) + 'px';
  r.style.top = (e.clientY - rect.top) + 'px';
  el.appendChild(r);
  setTimeout(() => r.remove(), 700);
}

function openFullscreen(b) {
  const overlay = document.getElementById('fullscreenOverlay');
  document.getElementById('fsTitle').textContent = b.title;
  document.getElementById('fsUrl').textContent = b.url;
  document.getElementById('fsExternal').href = b.url;

  const content = document.getElementById('fsContent');
  content.innerHTML = `
    <div class="blocked-msg" id="blockedMsg" style="display:none">
      <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round">
        <circle cx="24" cy="24" r="20"/>
        <line x1="24" y1="14" x2="24" y2="26"/>
        <circle cx="24" cy="32" r="1.5" fill="currentColor"/>
      </svg>
      <h3>This site can't be embedded</h3>
      <p>Some sites block embedding in iframes for security reasons. Open it directly in a new tab instead.</p>
      <a href="${b.url}" target="_blank" rel="noopener">Open ${getDomain(b.url)} ↗</a>
    </div>
    <iframe class="fullscreen-iframe" src="${b.url}" id="fsIframe" allow="*"></iframe>
  `;

  const iframe = content.querySelector('#fsIframe');
  iframe.addEventListener('error', () => {
    document.getElementById('blockedMsg').style.display = 'flex';
    iframe.style.display = 'none';
  });

  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeFullscreen() {
  const overlay = document.getElementById('fullscreenOverlay');
  overlay.classList.remove('open');
  document.body.style.overflow = '';
  setTimeout(() => { document.getElementById('fsContent').innerHTML = ''; }, 350);
}

document.getElementById('urlInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') { document.getElementById('titleInput').focus(); }
});

document.getElementById('titleInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') addBubble();
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (document.getElementById('fullscreenOverlay').classList.contains('open')) closeFullscreen();
    else if (inputOpen) toggleInput();
  }
});

// Init
bubbles.forEach(renderBubble);
updateEmpty();

// Demo bubbles if empty
if (bubbles.length === 0) {
  const demos = [
    { id: 'd1', url: 'https://wikipedia.org', title: 'Wikipedia' },
    { id: 'd2', url: 'https://news.ycombinator.com', title: 'Hacker News' },
    { id: 'd3', url: 'https://openweathermap.org', title: 'Weather' },
    { id: 'd4', url: 'https://github.com/trending', title: 'GitHub Trending' },
  ];
  demos.forEach(b => {
    bubbles.push(b);
    renderBubble(b);
  });
  save();
  updateEmpty();
}
</script>
</body>
</html>
